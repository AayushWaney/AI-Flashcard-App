<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Card - Flashcard App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 24px;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
            color: #7f8c8d;
            display: block;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            resize: vertical;
            min-height: 80px;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        .btn-success {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }
        .btn-success:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            color: #3498db;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Add a New Card</h1>
        <p class="subtitle">Deck: <strong>{{ deck.title }}</strong></p>

        <form action="{{ url_for('add_card', deck_id=deck.id) }}" method="POST">
            <div class="form-group">
                <label>Front (Question/Prompt)</label>
                <textarea name="front" rows="3" required placeholder="e.g., What is a dictionary?"></textarea>
            </div>

            <div class="form-group">
                <label>Back (Answer)</label>
                <textarea name="back" rows="3" required placeholder="e.g., A collection of key-value pairs."></textarea>
            </div>

            <button type="submit" class="btn-success">Save Card</button>
        </form>

        <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>

</body>
</html>
