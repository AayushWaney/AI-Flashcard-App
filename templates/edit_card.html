<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Card - Flashcard App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #2c3e50; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .form-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 600px; box-sizing: border-box; }
        h1 { margin-top: 0; margin-bottom: 30px; font-size: 28px; text-align: center; color: #f39c12; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; font-size: 14px; color: #7f8c8d; display: block; margin-bottom: 8px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; min-height: 100px; font-family: inherit; }
        textarea:focus { outline: none; border-color: #f39c12; }
        .btn-primary { width: 100%; background-color: #f39c12; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.2s; margin-top: 10px; }
        .btn-primary:hover { background-color: #e67e22; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>✏️ Edit Flashcard</h1>

        <form action="{{ url_for('edit_card', card_id=card.id) }}" method="POST">
            <div class="form-group">
                <label>Front (Question)</label>
                <textarea name="front" required>{{ card.front }}</textarea>
            </div>

            <div class="form-group">
                <label>Back (Answer)</label>
                <textarea name="back" required>{{ card.back }}</textarea>
            </div>

            <button type="submit" class="btn-primary">Save Card</button>
        </form>

        <a href="{{ url_for('view_deck', deck_id=card.deck_id) }}" class="back-link">← Cancel</a>
    </div>

</body>
</html>
