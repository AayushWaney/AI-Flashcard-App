<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Import Deck - Flashcard App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h1 { margin-top: 0; margin-bottom: 20px; font-size: 28px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; font-size: 14px; color: #7f8c8d; display: block; margin-bottom: 8px; }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 16px; box-sizing: border-box;
        }
        .btn-primary {
            width: 100%; background-color: #3498db; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        .btn-primary:hover { background-color: #2980b9; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Import CSV Deck</h1>
        <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">
            Your CSV should have two columns: <strong>Front</strong> and <strong>Back</strong>.
        </p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul style="color: #e74c3c; font-weight: bold; text-align: center; list-style: none; padding: 0;">
            {% for message in messages %}
              <li>⚠ {{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('import_deck') }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>New Deck Title</label>
                <input type="text" name="title" placeholder="e.g., Spanish Vocabulary" required>
            </div>

            <div class="form-group">
                <label>CSV File</label>
                <input type="file" name="file" accept=".csv" required>
            </div>

            <button type="submit" class="btn-primary">Upload & Import</button>
        </form>

        <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>
    </div>

</body>
</html>
