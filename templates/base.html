<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Flashcard App{% endblock %}</title>
    <style>
        /* --- GLOBAL CSS VARIABLES --- */
        :root {
            --bg-color: #f0f4f8;
            --text-color: #333333;
            --card-bg: #ffffff;
            --heading-color: #2c3e50;
            --desc-color: #7f8c8d;
            --stats-bg: #2c3e50;
            --stats-text: #ffffff;
            --shadow-color: rgba(0,0,0,0.05);
            --shadow-hover: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --heading-color: #ffffff;
            --desc-color: #aaaaaa;
            --stats-bg: #1a1a1a;
            --stats-text: #e0e0e0;
            --shadow-color: rgba(0,0,0,0.3);
            --shadow-hover: rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3 { color: var(--heading-color); }

        /* Floating Theme Toggle accessible on ALL pages */
        .floating-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--stats-bg);
            color: var(--stats-text);
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px var(--shadow-color);
            transition: transform 0.2s;
            z-index: 1000;
        }
        .floating-toggle:hover { transform: translateY(-3px); }

        /* This slot allows child pages to add their own custom CSS */
        {% block styles %}{% endblock %}
    </style>
</head>
<body>

    {% block content %}{% endblock %}

    <button id="theme-toggle" class="floating-toggle">🌙 Dark Mode</button>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');

        // 1. Check local storage immediately
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            toggleBtn.innerText = '☀️ Light Mode';
        }

        // 2. Listen for clicks
        toggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                toggleBtn.innerText = '🌙 Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.innerText = '☀️ Light Mode';
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
