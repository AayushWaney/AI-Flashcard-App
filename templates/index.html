<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome - Flashcard App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #2c3e50;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        h1 {
            font-size: 54px;
            margin-bottom: 10px;
        }
        p {
            font-size: 20px;
            color: #7f8c8d;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.5;
        }
        .btn-container {
            display: flex;
            gap: 20px;
        }
        .btn {
            padding: 14px 35px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background-color: #3498db;
            color: white;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.4);
        }
        .btn-secondary {
            background-color: white;
            color: #3498db;
            border: 2px solid #3498db;
        }
        .btn-secondary:hover {
            background-color: #f8fbfd;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Master Your Subjects.</h1>
    <p>Build custom flashcards, track your progress, and ace your exams with a smarter way to study.</p>

    <div class="btn-container">
        <a href="{{ url_for('register') }}" class="btn btn-primary">Get Started</a>
        <a href="{{ url_for('login') }}" class="btn btn-secondary">Login</a>
    </div>

</body>
</html>
